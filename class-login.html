<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/66rKbPmb/trinh-duyet.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản Lý Lớp Học</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="css/style.css?v=1.7.0">
</head>
<body>
    <div class="header">
        <div class="nav-container">
            <a href="index.html" class="nav-left" style="text-decoration: none; cursor: pointer;">
                <img src="https://i.postimg.cc/66rKbPmb/trinh-duyet.png" alt="Logo" class="nav-logo">
                <div class="header-text">
                    <h1>Tra cứu học tập</h1>
                    <p>Học tập thông minh</p>
                </div>
            </a>
            <div class="nav-right">
                <a href="index.html" class="nav-btn" id="btnNavHome"><i class="fa-solid fa-house"></i> Trang chủ</a>
                <a href="student-login.html" class="nav-btn" id="btnNavStudent"><i class="fa-solid fa-graduation-cap"></i> Dành cho PH / HS</a>
                <a href="tutor-login.html" class="nav-btn" id="btnNavTutor"><i class="fa-solid fa-chalkboard-user"></i> Dành cho Gia sư</a>
                <a href="class-login.html" class="nav-btn active" id="btnNavClass"><i class="fa-solid fa-users-rectangle"></i> Dành cho Lớp học</a>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="sectionClassLogin" class="page-section" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
            <div class="badge">
                <span>🏫</span> CỔNG THÔNG TIN LỚP HỌC
            </div>
            <h1 class="main-title">Quản lý <span class="highlight">Lớp Học</span> 📚</h1>
            <p class="sub-title" style="margin-bottom: 25px;">Đăng nhập bằng số điện thoại để quản lý lớp học, điểm danh và đánh giá tiến trình.</p>
            
            <div class="search-card" style="max-width: 440px; width: 100%;">
                <div class="search-title">
                    <i class="fa-solid fa-school"></i> Đăng nhập Giáo viên Lớp học
                </div>
                
                <!-- SDT Input -->
                <div class="modal-form-group" style="margin-bottom: 15px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: #A6ADCE; font-size: 13px; font-weight: 500;">Số điện thoại giáo viên</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-phone" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8E4DFF;"></i>
                        <input type="text" id="classPhone" placeholder="Nhập số điện thoại giáo viên..." style="width: 100%; padding: 14px 16px 14px 45px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #FFF; font-size: 15px; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='#8E4DFF'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                    </div>
                </div>
                
                <!-- PIN Input -->
                <div class="modal-form-group" style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: #A6ADCE; font-size: 13px; font-weight: 500;">Mã PIN bảo mật (nếu có)</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-key" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8E4DFF;"></i>
                        <input type="password" id="classPin" placeholder="Nhập mã PIN (tùy chọn)..." maxlength="6" style="width: 100%; padding: 14px 16px 14px 45px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #FFF; font-size: 15px; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='#8E4DFF'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                    </div>
                </div>
                
                <button class="btn-submit" onclick="xuLyClassLogin()" style="width: 100%; justify-content: center; height: 50px; border-radius: 12px; font-size: 15px; font-weight: bold; background: linear-gradient(135deg, #8E4DFF 0%, #5B21B6 100%); border: none;">
                    Đăng nhập Lớp Học <i class="fa-solid fa-right-to-bracket" style="margin-left: 6px;"></i>
                </button>
                
                <p id="classThongBaoLoi" class="error-msg" style="color: #EF4444; font-size: 13.5px; margin-top: 12px; display: none;"></p>
                <p id="classLoadingText" class="loading-text" style="color: #A6ADCE; font-size: 13.5px; margin-top: 12px; display: none;"><i class="fa-solid fa-circle-notch fa-spin"></i> Đang tải thông tin lớp học...</p>
            </div>
        </div>
    </div>
    
    <div class="desk-surface"></div>
    <img src="https://i.postimg.cc/sDp8SmLJ/anh-be-trai-removebg-preview.png" class="character char-boy" alt="Boy" onerror="this.style.display='none'">
    <img src="https://i.postimg.cc/1tJc0nQw/anh-be-gai-removebg-preview.png" class="character char-girl" alt="Girl" onerror="this.style.display='none'">

    <script src="js/api.js?v=1.8.2"></script>
    <script>
        function xuLyClassLogin() {
            var phone = document.getElementById("classPhone").value.trim();
            var pin = document.getElementById("classPin").value.trim();
            var errEl = document.getElementById("classThongBaoLoi");
            var loadingEl = document.getElementById("classLoadingText");

            if (!phone) {
                errEl.innerText = "Vui lòng nhập số điện thoại đăng nhập!";
                errEl.style.display = "block";
                return;
            }

            errEl.style.display = "none";
            loadingEl.style.display = "block";

            google.script.run.withSuccessHandler(function(res) {
                loadingEl.style.display = "none";
                if (res && res.error) {
                    errEl.innerText = res.error;
                    errEl.style.display = "block";
                } else if (res && res.success) {
                    sessionStorage.setItem("classTutorData", JSON.stringify(res));
                    sessionStorage.setItem("userTutorData", JSON.stringify(res));
                    sessionStorage.setItem("userPhone", phone);
                    sessionStorage.setItem("userRole", "class_tutor");

                    localStorage.setItem("classTutorData", JSON.stringify(res));
                    localStorage.setItem("userTutorData", JSON.stringify(res));
                    localStorage.setItem("userPhone", phone);
                    localStorage.setItem("userRole", "class_tutor");
                    window.location.href = "class-dashboard.html";
                } else {
                    errEl.innerText = "Đăng nhập không thành công. Vui lòng thử lại!";
                    errEl.style.display = "block";
                }
            }).loginClassSystem(phone, pin);
        }
    </script>
</body>
</html>
