<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Tra cứu Học tập</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="css/style.css?v=1.1.0">
</head>
<body>
    <div class="header">
        <div class="nav-container">
            <a href="index.html" class="nav-left" style="text-decoration: none; cursor: pointer;">
                <img src="https://cdn-icons-png.flaticon.com/512/3330/3330314.png" alt="Logo" class="nav-logo">
                <div class="header-text">
                    <h1>Tra cứu học tập</h1>
                    <p>Học tập thông minh</p>
                </div>
            </a>
            <div class="nav-right">
                <a href="index.html" class="nav-btn" id="btnNavHome"><i class="fa-solid fa-house"></i> Trang chủ</a>
                <a href="student-login.html" class="nav-btn" id="btnNavStudent"><i class="fa-solid fa-graduation-cap"></i> Dành cho PH / HS</a>
                <a href="tutor-login.html" class="nav-btn active" id="btnNavTutor"><i class="fa-solid fa-chalkboard-user"></i> Dành cho Gia sư</a>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="sectionTutorLogin" class="page-section" style="display: flex;">
            <div class="badge">
                <span>⭐</span> CỔNG THÔNG TIN GIA SƯ
            </div>
            <h1 class="main-title">Gia sư <span class="highlight">Đăng nhập</span> 🔐</h1>
            <p class="sub-title" style="margin-bottom: 25px;">Nhập số điện thoại đăng ký và mã PIN để vào trang quản lý lớp học.</p>
            
            <div class="search-card">
                <div class="search-title">
                    <i class="fa-solid fa-lock"></i> Đăng nhập hệ thống
                </div>
                
                <!-- SDT Input -->
                <div class="modal-form-group" style="margin-bottom: 15px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: #A6ADCE; font-size: 13px; font-weight: 500;">Số điện thoại đăng nhập</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-phone" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8E4DFF;"></i>
                        <input type="text" id="tutorPhone" placeholder="Nhập số điện thoại gia sư..." style="width: 100%; padding: 14px 16px 14px 45px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #FFF; font-size: 15px; transition: all 0.3s; box-shadow: none; outline: none;" onfocus="this.style.borderColor='#8E4DFF'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                    </div>
                </div>
                
                <!-- PIN Input -->
                <div class="modal-form-group" style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: #A6ADCE; font-size: 13px; font-weight: 500;">Mã PIN bảo mật</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-key" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8E4DFF;"></i>
                        <input type="password" id="tutorPin" placeholder="Nhập mã PIN gồm 6 số..." maxlength="6" style="width: 100%; padding: 14px 16px 14px 45px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #FFF; font-size: 15px; transition: all 0.3s; box-shadow: none; outline: none;" onfocus="this.style.borderColor='#8E4DFF'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                    </div>
                </div>
                
                <button class="btn-submit" onclick="xuLyTraCuu('tutor')" style="width: 100%; justify-content: center; height: 50px; border-radius: 12px; font-size: 15px; font-weight: bold; background: linear-gradient(135deg, #8E4DFF 0%, #5B21B6 100%); border: none;">
                    Đăng nhập hệ thống <i class="fa-solid fa-right-to-bracket" style="margin-left: 6px;"></i>
                </button>
                
                <p id="tutorThongBaoLoi" class="error-msg"></p>
                <p id="tutorLoadingText" class="loading-text"><i class="fa-solid fa-circle-notch fa-spin"></i> Đang xác thực thông tin...</p>
            </div>
        </div>
    </div>
    
    <div class="desk-surface"></div>
    <img src="https://i.postimg.cc/sDp8SmLJ/anh-be-trai-removebg-preview.png" class="character char-boy" alt="Boy" onerror="this.style.display='none'">
    <img src="https://i.postimg.cc/1tJc0nQw/anh-be-gai-removebg-preview.png" class="character char-girl" alt="Girl" onerror="this.style.display='none'">

        <!-- Background decorations -->
    <div class="decor planet-left"></div>
    <div class="decor planet-right"></div>
    <div class="decor rocket"></div>
    
    <div class="star twinkle-1" style="top: 10%; left: 20%; width: 2px; height: 2px;"></div>
    <div class="star twinkle-2" style="top: 15%; right: 25%; width: 3px; height: 3px;"></div>
    <div class="star twinkle-3" style="top: 40%; left: 10%; width: 2px; height: 2px;"></div>
    <div class="star twinkle-1" style="top: 70%; right: 15%; width: 3px; height: 3px;"></div>
    <div class="star twinkle-2" style="top: 85%; left: 30%; width: 2px; height: 2px;"></div>

    <script src="js/api.js?v=1.1.0"></script>
    <script src="js/navigation.js?v=1.1.0"></script>
</body>
</html>
